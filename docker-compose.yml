services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.server
    environment:
      PORT: 3001
      CLIENT_URL: http://localhost:8080
    expose:
      - "3001"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
